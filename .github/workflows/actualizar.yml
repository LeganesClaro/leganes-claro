name: Actualizar datos del Ayuntamiento

on:
  # Se ejecuta todos los días a las 9:00 (hora española en verano = 7:00 UTC)
  schedule:
    - cron: '0 7 * * *'

  # También se puede lanzar manualmente desde GitHub
  workflow_dispatch:
    inputs:
      modo:
        description: '¿Qué actualizar?'
        required: true
        default: 'todo'
        type: choice
        options:
          - todo
          - solo-plenos
          - solo-contratos

jobs:
  actualizar:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # necesario para hacer git push

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install anthropic requests beautifulsoup4 PyPDF2

      - name: Ejecutar el actualizador
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MODO="${{ github.event.inputs.modo || 'todo' }}"
          if [ "$MODO" = "solo-plenos" ]; then
            python automatizar/actualizar_datos.py --solo-plenos
          elif [ "$MODO" = "solo-contratos" ]; then
            python automatizar/actualizar_datos.py --solo-contratos
          else
            python automatizar/actualizar_datos.py
          fi

      - name: Publicar cambios si hay novedades
        run: |
          git config user.name  "Leganés Claro Bot"
          git config user.email "leganes.claro@gmail.com"
          git add data.js
          if git diff --cached --quiet; then
            echo "Sin cambios nuevos, nada que publicar."
          else
            git commit -m "Actualización automática de datos - $(date +'%B %Y')"
            git push
            echo "✅ Web actualizada correctamente."
          fi
